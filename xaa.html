<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Svetlé Počítadlo s Tlačidlom & Admin Panelom</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: table;
            width: 100%;
            height: 100vh;
            color: #333;
        }

        /* Layout */
        .main-wrapper {
            display: table-row;
        }

        .left-panel {
            display: table-cell;
            width: 60%;
            vertical-align: middle;
            text-align: center;
            padding: 20px;
        }

        .right-panel {
            display: table-cell;
            width: 40%;
            vertical-align: top;
            padding: 20px;
            background-color: white;
            border-left: 1px solid #ddd;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        /* Hlavný box s počítadlom (pôvodný štýl) */
        .counter-box {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: inline-block;
            width: 100%;
            max-width: 450px;
        }

        h1 {
            color: #333;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .counter-display {
            font-size: 3.5rem;
            font-weight: bold;
            color: #2c3e50;
            margin: 20px 0;
            font-variant-numeric: tabular-nums;
        }

        /* Veľké plus tlačidlo pod číslom */
        .btn-main-plus {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 0;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            width: 100%;
            box-shadow: 0 4px 6px rgba(46, 204, 113, 0.2);
            margin-top: 10px;
        }

        .btn-main-plus:hover {
            background-color: #27ae60;
        }

        .btn-main-plus:active {
            transform: scale(0.98);
        }

        .btn-main-plus:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
            transform: none;
        }

        /* Administračná tabuľka pre väčšie čiastky */
        .admin-title {
            font-size: 1.3rem;
            color: #333;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 10px;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            color: #555;
        }

        .admin-table th, .admin-table td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .admin-table th {
            color: #777;
            font-weight: 600;
        }

        /* Tlačidlá v admin paneli */
        .btn-admin {
            border: none;
            padding: 6px 12px;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-right: 3px;
        }

        .btn-admin:hover { opacity: 0.85; }
        .btn-admin-add { background-color: #3498db; color: white; }
        .btn-admin-sub { background-color: #e74c3c; color: white; }
        .btn-reset { background-color: #95a5a6; color: white; width: 100%; margin-top: 15px; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }

        .input-custom {
            width: 80px;
            padding: 6px;
            border-radius: 4px;
            border: 1px solid #ccc;
            background-color: white;
            color: #333;
            font-size: 0.9rem;
            text-align: center;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            background-color: #e74c3c; /* Predvolene červená, kým sa nepripojí */
            color: white;
            transition: background-color 0.3s;
        }

        .log-container {
            margin-top: 15px;
            background-color: #fafafa;
            padding: 10px;
            border-radius: 6px;
            height: 140px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.8rem;
            color: #666;
            border: 1px solid #eee;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <div class="left-panel">
            <div class="counter-box">
                <h1>Klikaj až do 999 999!</h1>
                <div class="counter-display" id="streamCounter">0</div>
                
                <button class="btn-main-plus" id="mainPlusBtn">+</button>
                
                <div style="color: #7f8c8d; font-size: 0.9rem; margin-top: 15px;">Cieľ: 999 999</div>
            </div>
        </div>

        <div class="right-panel">
            <h2 class="admin-title">Správa čiastok (Admin)</h2>
            
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Čiastka</th>
                        <th>Akcia</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><strong>+100 bodov</strong></td>
                        <td>
                            <button class="btn-admin btn-admin-add" onclick="modifyPoints(100)">Pridať 100</button>
                            <button class="btn-admin btn-admin-sub" onclick="modifyPoints(-100)">-100</button>
                        </td>
                    </tr>
                    <tr>
                        <td><strong>+1 000 bodov</strong></td>
                        <td>
                            <button class="btn-admin btn-admin-add" onclick="modifyPoints(1000)">Pridať 1k</button>
                            <button class="btn-admin btn-admin-sub" onclick="modifyPoints(-1000)">-1k</button>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <input type="number" id="customAmount" class="input-custom" value="5000">
                        </td>
                        <td>
                            <button class="btn-admin btn-admin-add" onclick="modifyPoints(parseInt(document.getElementById('customAmount').value) || 0)">Pridať vlastné</button>
                            <button class="btn-admin btn-admin-sub" onclick="modifyPoints(-(parseInt(document.getElementById('customAmount').value) || 0))">Odobrať</button>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div style="margin-top: 15px; font-size: 0.9rem;">
                <span style="color: #777;">TikTok Connector:</span>
                <span class="status-badge" id="connStatus">Live.js Odpojené</span>
            </div>

            <button class="btn-reset" onclick="resetCounter()">Resetovať celé počítadlo</button>

            <h3 style="margin-top: 20px; font-size: 0.95rem; color: #555;">História zmien:</h3>
            <div class="log-container" id="activityLog">
                [Systém] Počítadlo pripravené...
            </div>
        </div>

    </div>

    <script>
        let count = 0;
        const target = 999999;

        const streamCounter = document.getElementById('streamCounter');
        const mainPlusBtn = document.getElementById('mainPlusBtn');
        const activityLog = document.getElementById('activityLog');
        const connStatus = document.getElementById('connStatus');

        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, " ");
        }

        function logAction(message) {
            const time = new Date().toLocaleTimeString();
            activityLog.innerHTML = `[${time}] ${message}<br>` + activityLog.innerHTML;
        }

        function updateCounter(amount, source = "Klik") {
            const newCount = count + amount;
            
            if (newCount < 0) {
                count = 0;
            } else if (newCount >= target) {
                count = target;
                mainPlusBtn.disabled = true;
                logAction(`🎉 DOSIAHNUTÝ CIEĽ! (Zdroj: ${source})`);
            } else {
                count = newCount;
                mainPlusBtn.disabled = false;
            }

            streamCounter.textContent = formatNumber(count);
        }

        // +1 cez veľké zelené tlačidlo
        mainPlusBtn.addEventListener('click', () => {
            updateCounter(1, "Manuálne kliknutie");
        });

        // Admin tabuľka (väčšie sumy)
        function modifyPoints(amount) {
            updateCounter(amount, "Admin panel");
            logAction(`Admin zmenil body o: ${amount > 0 ? '+' : ''}${formatNumber(amount)}`);
        }

        function resetCounter() {
            if(confirm("Naozaj vynulovať počítadlo?")) {
                count = 0;
                streamCounter.textContent = "0";
                mainPlusBtn.disabled = false;
                logAction("🔄 Počítadlo kompletne vynulované.");
            }
        }

        /************************************************************
         * KOMPATIBILITA PRE live.js (TikTok Live Connector)
         ************************************************************/
        window.addPointsFromTikTok = function(amount, username = "Používateľ", eventType = "darček") {
            updateCounter(amount, `TikTok - ${username}`);
            logAction(`📱 ${username} poslal ${eventType} (+${formatNumber(amount)})`);
        };

        // WEBSOCKET PREPOJENIE NA live.js SERVER
        function connectWebSocket() {
            const ws = new WebSocket('ws://localhost:8080');

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    window.addPointsFromTikTok(data.amount, data.username, data.giftName);
                } catch (e) {
                    console.error("Chyba spracovania dát:", e);
                }
            };

            ws.onopen = () => {
                connStatus.textContent = "Live.js Pripojené";
                connStatus.style.backgroundColor = "#2ecc71";
                logAction("🔌 Prepojenie s live.js úspešne nadviazané.");
            };

            ws.onclose = () => {
                connStatus.textContent = "Live.js Odpojené";
                connStatus.style.backgroundColor = "#e74c3c";
                // Automatický pokus o znovupripojenie každých 5 sekúnd, ak vypneš/zapneš node skript
                setTimeout(connectWebSocket, 5000);
            };
        }

        // Spustíme hneď po načítaní stránky
        connectWebSocket();
    </script>

</body>
</html>
